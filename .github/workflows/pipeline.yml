name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t health-monitoring-app .

      - name: Run pipeline tests
        run: docker run health-monitoring-app pytest tests/test_pipeline.py -v

      - name: Run API tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run -e DATABASE_URL=${{ secrets.DATABASE_URL }} health-monitoring-app pytest tests/test_api_endpoints.py -v

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
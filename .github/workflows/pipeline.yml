name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t health-monitoring-app .

      - name: Run pipeline tests
        run: docker run health-monitoring-app pytest tests/test_pipeline.py -v

      - name: Run API tests
        run: docker run health-monitoring-app pytest tests/test_api_endpoints.py -v

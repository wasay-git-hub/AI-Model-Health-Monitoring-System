version: '3.8'

services:
  api_service:
    build: .
    container_name: saleswatch_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./src:/app/src
      - ./mlruns:/app/mlruns  # <--- THIS KEEPS YOUR LOGS SAFE
    command: python -m uvicorn src.fast_api.api_app:app --host 0.0.0.0 --port 8000
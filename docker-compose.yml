version: '3.8'

services:
  # FastAPI + HTML Frontend
  api_service:
    build: .
    container_name: saleswatch_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Tells the API to log metrics to the mlflow container
      - MLFLOW_TRACKING_URI=http://mlflow_monitor:5000
    volumes:
      # Maps local folders to the container
      - ./models:/app/models
      - ./data:/app/data
      - ./src:/app/src
    depends_on:
      - mlflow_monitor
    command: python -m uvicorn src.fast_api.api_app:app --host 0.0.0.0 --port 8000

  # MLflow
  mlflow_monitor:
    build: .
    container_name: saleswatch_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    command: mlflow ui --host 0.0.0.0 --port 5000 --workers 1